name: ketchup-backend

x-api-env: &api-env
  DATABASE_URL: ${DATABASE_URL_INTERNAL:-postgresql://postgres:postgres@db:5432/appdb}
  VLLM_BASE_URL: ${VLLM_BASE_URL_INTERNAL:-http://vllm:8080/v1}
  VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen3-4B-Instruct-2507}
  VLLM_API_KEY: ${VLLM_API_KEY:-EMPTY}
  PLANNER_NOVELTY_TARGET_GENERATE: ${PLANNER_NOVELTY_TARGET_GENERATE:-0.7}
  PLANNER_NOVELTY_TARGET_REFINE: ${PLANNER_NOVELTY_TARGET_REFINE:-0.35}
  PLANNER_FALLBACK_ENABLED: ${PLANNER_FALLBACK_ENABLED:-true}
  BACKEND_INTERNAL_API_KEY: ${BACKEND_INTERNAL_API_KEY:-dev-internal-key-change-me}
  GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
  TAVILY_API_KEY: ${TAVILY_API_KEY:-}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}

x-pipeline-env: &pipeline-env
  DATABASE_URL: ${DATABASE_URL_INTERNAL:-postgresql://postgres:postgres@db:5432/appdb}
  AIRFLOW_HOME: /app/airflow_home
  PYTHONPATH: /app
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__EXECUTOR: SequentialExecutor
  AIRFLOW__CORE__DAGS_FOLDER: /app/pipelines/airflow/dags
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////app/airflow_home/airflow.db

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      <<: *api-env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uv run --no-project uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  vllm:
    profiles: ["llm"]
    build:
      context: .
      dockerfile: vllm/Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN:-}
        VLLM_MODEL_REPO: ${VLLM_MODEL_REPO:-Qwen/Qwen3-4B-Instruct-2507}
        VLLM_MODEL_DIR: ${VLLM_MODEL_DIR:-Qwen3-4B-Instruct-2507}
    environment:
      PORT: 8080
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen3-4B-Instruct-2507}
      VLLM_MODEL_PATH: ${VLLM_MODEL_PATH:-/model-cache/Qwen3-4B-Instruct-2507}
      VLLM_GPU_MEMORY_UTILIZATION: ${VLLM_GPU_MEMORY_UTILIZATION:-0.70}
      VLLM_MAX_MODEL_LEN: ${VLLM_MAX_MODEL_LEN:-4096}
      VLLM_MAX_NUM_SEQS: ${VLLM_MAX_NUM_SEQS:-4}
      VLLM_TOOL_CALL_PARSER: ${VLLM_TOOL_CALL_PARSER:-hermes}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pipeline:
    profiles: ["pipeline"]
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    env_file:
      - ./.env
    environment:
      <<: *pipeline-env
    working_dir: /app
    # ports:
    #   - "8081:8080"
    volumes:
      - .:/app
      - airflow_home:/app/airflow_home
    depends_on:
      db:
        condition: service_healthy
    command: sleep infinity

volumes:
  pgdata:
  airflow_home:
