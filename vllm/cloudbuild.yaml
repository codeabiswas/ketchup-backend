steps:
  - name: "gcr.io/cloud-builders/docker"
    id: build
    entrypoint: "bash"
    secretEnv: ["HF_TOKEN"]
    args:
      - -c
      - |
        docker buildx build \
          --file=vllm/Dockerfile \
          --tag="${_IMAGE}" \
          --secret id=HF_TOKEN \
          --build-arg VLLM_MODEL_REPO="${_MODEL_REPO}" \
          --build-arg VLLM_MODEL_DIR="${_MODEL_DIR}" \
          .

availableSecrets:
  secretManager:
    - versionName: "projects/${PROJECT_ID}/secrets/HF_TOKEN/versions/latest"
      env: "HF_TOKEN"

images: ["${_IMAGE}"]

substitutions:
  _IMAGE: "${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_NAME}:latest"
  _REPO: "ketchup-vllm-dev"
  _NAME: "qwen3-4b-2507-vllm"
  _MODEL_REPO: "Qwen/Qwen3-4B-Instruct-2507"
  _MODEL_DIR: "Qwen3-4B-Instruct-2507"

options:
  dynamicSubstitutions: true
  machineType: "E2_HIGHCPU_32"
