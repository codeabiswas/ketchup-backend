name: Deploy Backend to GCP

on:
  push:
    branches: [main, staging]
    paths-ignore:
      - "**.md"
      - "data/**"
      - "scripts/run_model_bias_*.py"
      - "scripts/check_model_bias_*.py"
      - "scripts/evaluate_tool_calling_*.py"
      - "pipelines/bias_detection.py"
  workflow_dispatch:
    inputs:
      environment:
        description: "Override environment (leave blank to use branch default)"
        required: false
        type: choice
        options: ["", dev, prod]

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -m "not integration"

  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      # ── 0. Determine environment from branch ─────────────────────────────
      - name: Set environment
        id: env
        run: |
          if [ -n "${{ inputs.environment }}" ]; then
            ENV="${{ inputs.environment }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            ENV="prod"
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            ENV="dev"
          else
            ENV="dev"
          fi
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "Deploying to **$ENV** (branch: ${{ github.ref_name }})" >> $GITHUB_STEP_SUMMARY

      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Authenticate to GCP via Service Account Key ────────────────────
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # ── 3. Build & push Docker image ──────────────────────────────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry repo exists
        env:
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
        run: |
          gcloud artifacts repositories describe "ketchup-backend-${ENVIRONMENT}" \
            --location=${{ env.REGION }} --project=${{ env.PROJECT_ID }} 2>/dev/null \
          || gcloud artifacts repositories create "ketchup-backend-${ENVIRONMENT}" \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --description="Docker repository for Ketchup Backend (${ENVIRONMENT})"

      - name: Build and push Docker image
        id: build
        env:
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
        run: |
          REGISTRY="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/ketchup-backend-${ENVIRONMENT}"
          IMAGE_SHA="$REGISTRY/ketchup-backend:${{ github.sha }}"
          IMAGE_LATEST="$REGISTRY/ketchup-backend:latest"

          docker build -t "$IMAGE_SHA" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

          echo "image=$IMAGE_SHA" >> $GITHUB_OUTPUT

      # ── 4. Terraform ──────────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Generate terraform.tfvars
        working-directory: terraform
        env:
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
        run: |
          cat > terraform.tfvars <<EOF
          project_id   = "${{ env.PROJECT_ID }}"
          region       = "${{ env.REGION }}"
          environment  = "${ENVIRONMENT}"
          backend_image = "${{ steps.build.outputs.image }}"
          frontend_url  = "${{ vars.FRONTEND_URL || 'http://localhost:3001' }}"
          vllm_base_url = "${{ vars.VLLM_BASE_URL || '' }}"
          vllm_model    = "${{ vars.VLLM_MODEL || 'Qwen/Qwen3-4B-Instruct-2507' }}"
          backend_min_instances = ${{ vars.BACKEND_MIN_INSTANCES || '0' }}
          backend_max_instances = ${{ vars.BACKEND_MAX_INSTANCES || '3' }}
          db_instance_tier      = "${{ vars.DB_INSTANCE_TIER || 'db-f1-micro' }}"
          smtp_host       = "${{ vars.SMTP_HOST || 'smtp.gmail.com' }}"
          smtp_port       = ${{ vars.SMTP_PORT || '587' }}
          smtp_user       = "${{ vars.SMTP_USER || '' }}"
          smtp_from_email = "${{ vars.SMTP_FROM_EMAIL || '' }}"
          EOF

      - name: Terraform Init
        working-directory: terraform
        env:
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.GCS_TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/${ENVIRONMENT}"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      # Secrets may have been created manually (see gcp.md §2) before Terraform
      # managed them. Import any that exist in GCP but aren't in state yet so
      # `apply` doesn't fail with a 409 "already exists" error.
      # Secret IDs are environment-suffixed (DATABASE_URL_dev / DATABASE_URL_prod)
      # so dev and prod are fully isolated.
      - name: Import pre-existing Secret Manager secrets
        working-directory: terraform
        env:
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
        run: |
          set -euo pipefail
          declare -A SECRETS=(
            [google_secret_manager_secret.database_url]="DATABASE_URL_${ENVIRONMENT}"
            [google_secret_manager_secret.google_maps_api_key]="GOOGLE_MAPS_API_KEY_${ENVIRONMENT}"
            [google_secret_manager_secret.tavily_api_key]="TAVILY_API_KEY_${ENVIRONMENT}"
            [google_secret_manager_secret.vllm_api_key]="VLLM_API_KEY_${ENVIRONMENT}"
            [google_secret_manager_secret.backend_internal_api_key]="BACKEND_INTERNAL_API_KEY_${ENVIRONMENT}"
            [google_secret_manager_secret.hf_token]="HF_TOKEN_${ENVIRONMENT}"
            [google_secret_manager_secret.smtp_password]="SMTP_PASSWORD_${ENVIRONMENT}"
          )
          STATE_LIST=$(terraform state list 2>/dev/null || true)
          for tf_addr in "${!SECRETS[@]}"; do
            gcp_id="${SECRETS[$tf_addr]}"
            if echo "$STATE_LIST" | grep -qx "$tf_addr"; then
              echo "✓ already in state: $tf_addr"
              continue
            fi
            if gcloud secrets describe "$gcp_id" --project="${{ env.PROJECT_ID }}" >/dev/null 2>&1; then
              echo "→ importing $tf_addr from projects/${{ env.PROJECT_ID }}/secrets/$gcp_id"
              terraform import "$tf_addr" "projects/${{ env.PROJECT_ID }}/secrets/$gcp_id"
            else
              echo "  (skipping $gcp_id — doesn't exist yet, Terraform will create it)"
            fi
          done

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      # ── 5. Populate GCP Secrets Manager ───────────────────────────────────
      # Writes to env-suffixed secret IDs (e.g. GOOGLE_MAPS_API_KEY_dev /
      # GOOGLE_MAPS_API_KEY_prod) so dev and prod stay isolated.
      - name: Populate secrets in Secret Manager
        env:
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
        run: |
          populate_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "Skipping $name (empty)"
              return
            fi
            printf '%s' "$value" | gcloud secrets versions add "$name" \
              --data-file=- \
              --project="${{ env.PROJECT_ID }}" 2>&1 || true
          }

          populate_secret "GOOGLE_MAPS_API_KEY_${ENVIRONMENT}"     "${{ secrets.GOOGLE_MAPS_API_KEY }}"
          populate_secret "TAVILY_API_KEY_${ENVIRONMENT}"          "${{ secrets.TAVILY_API_KEY }}"
          populate_secret "VLLM_API_KEY_${ENVIRONMENT}"            "${{ secrets.VLLM_API_KEY }}"
          populate_secret "BACKEND_INTERNAL_API_KEY_${ENVIRONMENT}" "${{ secrets.BACKEND_INTERNAL_API_KEY }}"
          populate_secret "HF_TOKEN_${ENVIRONMENT}"                "${{ secrets.HF_TOKEN }}"
          populate_secret "SMTP_PASSWORD_${ENVIRONMENT}"           "${{ secrets.SMTP_PASSWORD }}"

      # ── 6. Deployment summary ──────────────────────────────────────────────
      - name: Deployment summary
        working-directory: terraform
        env:
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
        run: |
          echo "### Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${ENVIRONMENT}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ steps.build.outputs.image }}" >> $GITHUB_STEP_SUMMARY
          BACKEND_URL=$(terraform output -raw backend_url 2>/dev/null || echo "unavailable")
          echo "**Backend URL:** $BACKEND_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Health check: \`curl $BACKEND_URL/health\`" >> $GITHUB_STEP_SUMMARY

      # ── 7. Notify on failure ───────────────────────────────────────────────
      - name: Notify failure via email
        if: ${{ failure() && vars.ALERT_EMAIL_TO != '' }}
        uses: ./.github/actions/notify-failure
        with:
          smtp_host: ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
          smtp_port: ${{ vars.SMTP_PORT || '587' }}
          smtp_user: ${{ vars.SMTP_USER }}
          smtp_password: ${{ secrets.SMTP_PASSWORD }}
          from_email: ${{ vars.SMTP_FROM_EMAIL }}
          to: ${{ vars.ALERT_EMAIL_TO }}
