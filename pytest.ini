[tool:pytest]
# Pytest configuration for Ketchup backend

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    integration: Integration tests requiring external services
    unit: Unit tests
    slow: Slow running tests
    smoke: Smoke tests

# Coverage options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --disable-warnings

# Asyncio
asyncio_mode = auto

# Avoid test collection warnings
norecursedirs = .git .venv venv infra
